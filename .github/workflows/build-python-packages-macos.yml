name: Build Python Packages for macOS

# Run when a release branch (release-*) is pushed, or when a release tag is pushed.
# Mirrors the Linux build-python-packages workflow but uses the macOS bridge script
# at tools/python/bridge/create_package.macos.sh. Builds cp313 and cp314 wheels in
# the same job so the slow LLVM build (~1h) is shared across both.
on:
  push:
    branches:
      - 'release-*'
    tags:
      - 'v*'

jobs:
  build_python_macos_arm64:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Homebrew packages
        id: cache-brew
        uses: actions/cache@v4
        with:
          path: |
            /opt/homebrew
            ~/Library/Caches/Homebrew
          key: brew-macos-15-pypkg-${{ hashFiles('.github/workflows/build-python-packages-macos.yml', 'tools/python/bridge/create_package.macos.sh') }}
          restore-keys: |
            brew-macos-15-pypkg-
            brew-macos-15-

      - name: Install dependencies with Homebrew
        run: |
          brew update
          brew install cmake ninja llvm@20 bzip2 libffi libedit libxml2 brotli zlib apache-arrow boost flex bison wget python@3.13 python@3.14
          brew link --force cmake ninja llvm@20 bzip2 libffi libedit libxml2 brotli zlib apache-arrow boost flex bison

      # The macOS bridge script self-detects existing LLVM/Arrow installs in
      # build/llvm-install and build/arrow-install and skips rebuilding them.
      # Caching these directories cuts the LLVM build (~1h) on subsequent runs.
      - name: Cache LLVM install
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: build/llvm-install
          key: macos-15-llvm-install-20.1.2-${{ hashFiles('tools/python/bridge/create_package.macos.sh') }}

      - name: Cache Arrow install
        id: cache-arrow
        uses: actions/cache@v4
        with:
          path: build/arrow-install
          key: macos-15-arrow-install-24.0.0-${{ hashFiles('tools/python/bridge/create_package.macos.sh') }}

      - name: Build wheel (cp313)
        run: |
          mkdir -p built-packages-313
          bash tools/python/bridge/create_package.macos.sh 3.13
          cp build/pylingodb-313/build-packages/*.whl built-packages-313/
          cd tools/python
          /opt/homebrew/bin/python3.13 -m venv venv-313
          venv-313/bin/python3 -m pip install build
          venv-313/bin/python3 -m build .
          cp dist/*.whl ../../built-packages-313/
          rm -rf dist

      - name: Build wheel (cp314)
        run: |
          mkdir -p built-packages-314
          bash tools/python/bridge/create_package.macos.sh 3.14
          cp build/pylingodb-314/build-packages/*.whl built-packages-314/
          cd tools/python
          /opt/homebrew/bin/python3.14 -m venv venv-314
          venv-314/bin/python3 -m pip install build
          venv-314/bin/python3 -m build .
          cp dist/*.whl ../../built-packages-314/
          rm -rf dist

      - uses: actions/upload-artifact@v4
        with:
          name: python-dist-macos-arm64-313
          path: built-packages-313

      - uses: actions/upload-artifact@v4
        with:
          name: python-dist-macos-arm64-314
          path: built-packages-314

  collect_packages_macos:
    needs: [build_python_macos_arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS arm64 cp313 dist
        uses: actions/download-artifact@v4
        with:
          name: python-dist-macos-arm64-313
          path: dist/
      - name: Download macOS arm64 cp314 dist
        uses: actions/download-artifact@v4
        with:
          name: python-dist-macos-arm64-314
          path: dist/
      - uses: actions/upload-artifact@v4
        with:
          name: built-python-wheels-macos
          path: dist/

  # Smoke test the released wheels on a clean macos-15 runner to verify they
  # install and import without the brew toolchain that built them.
  test_python_macos_arm64:
    needs: [build_python_macos_arm64]
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - python_version: '3.13'
            tag: '313'
          - python_version: '3.14'
            tag: '314'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}
      - uses: actions/download-artifact@v4
        with:
          name: python-dist-macos-arm64-${{ matrix.tag }}
          path: built-packages
      - name: Install + run smoke tests
        run: |
          python -m pip install built-packages/*.whl
          python -m pip install pandas
          python tools/python/test/test.py
          python tools/python/test/mlir-construction.py
