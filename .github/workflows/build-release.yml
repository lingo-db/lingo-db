name: build release binaries

# Run when a release branch (release-*) is pushed, or when a release tag is pushed.
# Pushing a release-* branch produces validation builds for an upcoming release;
# pushing a v* tag produces the final release artifacts.
on:
  push:
    branches:
      - 'release-*'
    tags:
      - 'v*'
env:
  REGISTRY: ghcr.io
jobs:
  release-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-latest
          - arch: arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    container: ghcr.io/lingo-db/lingodb-py-dev:ba723e305302f60aefe75084c3b0c60e12dbad70

    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          submodules: recursive
      - name: Build
        run: |
          export PATH=/built-llvm/bin/:$PATH
          mkdir build
          cmake -G Ninja . -B build -DCMAKE_BUILD_TYPE=Release -DClang_DIR=/built-llvm/lib/cmake/clang -DArrow_DIR=/built-arrow/lib64/cmake/Arrow -DArrowCompute_DIR=/built-arrow/lib64/cmake/ArrowCompute -DENABLE_TESTS=OFF -DENABLE_BASELINE_BACKEND=True
          cmake --build build --target sql run-sql run-mlir mlir-db-opt sql-to-mlir
      - uses: actions/upload-artifact@master
        with:
          name: lingodb-cli-linux-${{ matrix.arch }}
          path: build/sql
      - uses: actions/upload-artifact@master
        with:
          name: lingodb-tools-linux-${{ matrix.arch }}
          path: |
            build/run-sql
            build/run-mlir
            build/mlir-db-opt
            build/sql-to-mlir

  # Smoke test the released binaries on a clean Ubuntu runner (no dev
  # container) to verify they're self-contained for the manylinux baseline.
  smoke_test_release:
    needs: release-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-latest
          - arch: arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: lingodb-cli-linux-${{ matrix.arch }}
          path: artifacts/cli
      - uses: actions/download-artifact@v4
        with:
          name: lingodb-tools-linux-${{ matrix.arch }}
          path: artifacts/tools
      - name: Stage binaries
        run: |
          mkdir -p bin
          # upload-artifact preserves the build/ prefix, so flatten by name.
          for tool in sql run-sql run-mlir mlir-db-opt sql-to-mlir; do
            cp "$(find artifacts -type f -name "$tool" | head -1)" bin/
          done
          chmod +x bin/*
          ls -la bin/
      - name: Run a tiny query end-to-end
        run: |
          mkdir -p tinydb
          cat <<'SQL' > setup.sql
          set persist=1;
          create table t(x int);
          insert into t values (1), (2), (3);
          SQL
          bin/sql tinydb < setup.sql
          # No trailing newline: sql-to-mlir on this branch loops once extra
          # on a final "\n" iteration and segfaults on the empty parse result.
          # Fix is in flight on a separate branch.
          printf 'select sum(x) from t;' > q.sql
          bin/run-sql q.sql tinydb | tee result.txt
          grep -q '6' result.txt
          bin/sql-to-mlir q.sql tinydb > q.mlir
          test -s q.mlir
          # mlir-db-opt and run-mlir need full lowering pipelines; just
          # verify the binaries load cleanly here.
          bin/mlir-db-opt --help > /dev/null 2>&1 || true
          bin/run-mlir --help > /dev/null 2>&1 || true
