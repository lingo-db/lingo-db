name: build release binaries

# Run when a release branch (release-*) is pushed, or when a release tag is pushed.
# Pushing a release-* branch produces validation builds for an upcoming release;
# pushing a v* tag produces the final release artifacts.
on:
  push:
    branches:
      - 'release-*'
    tags:
      - 'v*'
env:
  REGISTRY: ghcr.io
jobs:
  release-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-latest
          - arch: arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    container: ghcr.io/lingo-db/lingodb-py-dev:ba723e305302f60aefe75084c3b0c60e12dbad70

    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          submodules: recursive
      - name: Build
        run: |
          export PATH=/built-llvm/bin/:$PATH
          mkdir build
          cmake -G Ninja . -B build -DCMAKE_BUILD_TYPE=Release -DClang_DIR=/built-llvm/lib/cmake/clang -DArrow_DIR=/built-arrow/lib64/cmake/Arrow -DArrowCompute_DIR=/built-arrow/lib64/cmake/ArrowCompute -DENABLE_TESTS=OFF -DENABLE_BASELINE_BACKEND=True
          cmake --build build --target sql run-sql run-mlir mlir-db-opt sql-to-mlir
      - uses: actions/upload-artifact@master
        with:
          name: lingodb-cli-linux-${{ matrix.arch }}
          path: build/sql
      - uses: actions/upload-artifact@master
        with:
          name: lingodb-tools-linux-${{ matrix.arch }}
          path: |
            build/run-sql
            build/run-mlir
            build/mlir-db-opt
            build/sql-to-mlir
