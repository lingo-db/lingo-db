name: build+test (ubuntu 24.04 x86_64)

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
jobs:
  build:
    strategy:
      matrix:
        build_type: [ debug, asan, release ]
    runs-on: ubuntu-24.04
    container: ghcr.io/lingo-db/lingodb-dev:ba723e305302f60aefe75084c3b0c60e12dbad70
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          submodules: recursive
      - name: CCache
        id: ccache
        uses: actions/cache@v3
        with:
          path: /ccache
          key: ccache-${{ matrix.build_type }}-build
      - name: Build
        run: |
          mkdir -p /ccache
          make clean
          make build-${{ matrix.build_type }}
        env:
          CCACHE_DIR: /ccache
          CC: ccache clang-20
          CXX: ccache clang++-20
          ENABLE_BASELINE_BACKEND: "ON"
      - uses: actions/upload-artifact@master
        with:
          name: ${{ matrix.build_type }}-build
          path: build/lingodb-${{ matrix.build_type }}
          retention-days: 1

  test:
    needs: build
    strategy:
      matrix:
        build_type: [ debug, asan ]
    runs-on: ubuntu-24.04
    container: ghcr.io/lingo-db/lingodb-dev:ba723e305302f60aefe75084c3b0c60e12dbad70
    steps:
      - uses: actions/checkout@master
      - uses: actions/download-artifact@master
        with:
          name: ${{ matrix.build_type }}-build
          path: build/lingodb-${{ matrix.build_type }}
      - name: Setup for tests
        run: |
          touch build/dependencies
          touch build/lingodb-${{ matrix.build_type }}/.stamp
          touch build/lingodb-${{ matrix.build_type }}/.buildstamp
          chmod +x build/lingodb-${{ matrix.build_type }}/*
      - name: Test lit
        run: |
          make test-no-rebuild-lit
        env:
          TEST_BUILD_TYPE: ${{ matrix.build_type }}
          DATA_BUILD_TYPE: ${{ matrix.build_type }}

      - name: Test unit
        run: |
          make test-no-rebuild-unit
        env:
          TEST_BUILD_TYPE: ${{ matrix.build_type }}
          DATA_BUILD_TYPE: ${{ matrix.build_type }}

      - name: Test sqlite-small (llvm)
        run: |
          make test-no-rebuild-sqlite-small
        env:
          TEST_BUILD_TYPE: ${{ matrix.build_type }}
          DATA_BUILD_TYPE: ${{ matrix.build_type }}
          LINGODB_EXECUTION_MODE: DEFAULT

      - name: Test sqlite-small (baseline)
        run: |
          # only run sqlite-small for default and baseline backend, since lit chooses backend on its own and unit is backend-agnostic
          make test-no-rebuild-sqlite-small
        env:
          TEST_BUILD_TYPE: ${{ matrix.build_type }}
          DATA_BUILD_TYPE: ${{ matrix.build_type }}
          LINGODB_EXECUTION_MODE: BASELINE

  sqlite_tests:
    strategy:
      matrix:
        build_type: [ release, asan ]
    needs: build
    runs-on: ubuntu-24.04
    container: ghcr.io/lingo-db/lingodb-dev:ba723e305302f60aefe75084c3b0c60e12dbad70
    steps:
      - uses: actions/checkout@master
      - uses: actions/download-artifact@master
        with:
          name: ${{ matrix.build_type }}-build
          path: build/lingodb-${{ matrix.build_type }}
      - name: Setup for tests
        run: |
          touch build/dependencies
          touch build/lingodb-${{ matrix.build_type }}/.stamp
          touch build/lingodb-${{ matrix.build_type }}/.buildstamp
          chmod +x build/lingodb-${{ matrix.build_type }}/*
      - name: Test llvm backend
        run: |
          make test-no-rebuild-sqlite
        env:
          SQLITE_TEST_BUILD_TYPE: ${{ matrix.build_type }}
          LINGODB_EXECUTION_MODE: "DEFAULT"
      - name: Test baseline backend
        run: |
          make test-no-rebuild-sqlite
        env:
          SQLITE_TEST_BUILD_TYPE: ${{ matrix.build_type }}
          LINGODB_EXECUTION_MODE: "BASELINE"

  sqlite_dataset-tests:
    strategy:
      matrix:
        build_type: [ release, asan ]
    needs: build
    runs-on: ubuntu-24.04
    container: ghcr.io/lingo-db/lingodb-dev:ba723e305302f60aefe75084c3b0c60e12dbad70
    steps:
      - name: Freeing up space
        run: |
          rm -rf /usr/local/lib/android
          rm -rf /usr/share/dotnet
          rm -rf /usr/lib/jvm
          rm -rf /opt/ghc /opt/cabal
      - uses: actions/checkout@master
      - uses: actions/download-artifact@master
        with:
          name: ${{ matrix.build_type }}-build
          path: build/lingodb-${{ matrix.build_type }}
      - name: Clean up build directory to save space
        shell: bash
        run: |
          shopt -s extglob
          cd build/lingodb-${{ matrix.build_type }}
          rm -rf !("sql"|"sqlite-tester"|".buildstamp"|".stamp")
          cd ../..
      - name: Prepare Binaries
        run: |
          chmod +x build/lingodb-${{ matrix.build_type }}/*
      - name: Restore datasets from cache
        id: cache-datasets
        uses: actions/cache@v4
        with:
          path: /datasets/
          key: datasets-with-job
      - name: Generate dataset if not cached
        if: steps.cache-datasets.outputs.cache-hit != 'true'
        run: |
          apt-get update && apt-get install -y bison flex zstd
          mkdir -p /datasets/tpch-1
          mkdir -p /datasets/tpcds-1
          mkdir -p /datasets/job
          bash tools/generate/tpch.sh /datasets/tpch-1 1
          bash tools/generate/tpcds.sh /datasets/tpcds-1 1
          bash tools/generate/job.sh /datasets/job
      - name: Load dataset tpch
        run: |
          export BASE_PATH=$(pwd)
          mkdir -p /db/tpch-1
          cd /datasets/tpch-1
          $BASE_PATH/build/lingodb-${{ matrix.build_type }}/sql /db/tpch-1 < $BASE_PATH/resources/sql/tpch/initialize.sql
      - name: Load dataset tpcds
        run: |
          export BASE_PATH=$(pwd)
          mkdir -p /db/tpcds-1
          cd /datasets/tpcds-1
          $BASE_PATH/build/lingodb-${{ matrix.build_type }}/sql /db/tpcds-1 < $BASE_PATH/resources/sql/tpcds/initialize.sql
      - name: Test tpch (llvm)
        run: build/lingodb-${{ matrix.build_type }}/sqlite-tester test/sqlite-datasets/tpchSf1.test /db/tpch-1
        env:
          LINGODB_EXECUTION_MODE: DEFAULT
      - name: Test tpch (baseline)
        run: build/lingodb-${{ matrix.build_type }}/sqlite-tester test/sqlite-datasets/tpchSf1.test /db/tpch-1
        env:
          LINGODB_EXECUTION_MODE: BASELINE

      - name: Test tpcds (llvm)
        run: build/lingodb-${{ matrix.build_type }}/sqlite-tester test/sqlite-datasets/tpcdsSf1.test /db/tpcds-1
        env:
          LINGODB_EXECUTION_MODE: DEFAULT
      - name: Test tpcds (baseline)
        run: build/lingodb-${{ matrix.build_type }}/sqlite-tester test/sqlite-datasets/tpcdsSf1.test /db/tpcds-1
        env:
          LINGODB_EXECUTION_MODE: BASELINE
      - name: Load dataset job
        run: |
          rm -rf /db
          export BASE_PATH=$(pwd)
          mkdir -p /db/job
          cd /datasets/job
          $BASE_PATH/build/lingodb-${{ matrix.build_type }}/sql /db/job < $BASE_PATH/resources/sql/job/initialize.sql
      - name: Test job (llvm)
        run: build/lingodb-${{ matrix.build_type }}/sqlite-tester test/sqlite-datasets/job.test /db/job
        env:
          LINGODB_EXECUTION_MODE: DEFAULT
      - name: Test job (baseline)
        run: build/lingodb-${{ matrix.build_type }}/sqlite-tester test/sqlite-datasets/job.test /db/job
        env:
          LINGODB_EXECUTION_MODE: BASELINE


  # cp312 wheel: built WITHOUT embedded-CPython UDF support. The
  # Py_FinalizeEx auto-reap of leftover sub-interpreters that the
  # destructor relies on lives only in CPython 3.13+. Anyone using the
  # cp312 wheel still gets full SQL/MLIR functionality, just no Python
  # UDFs.
  build_lingodb_python:
    runs-on: ubuntu-24.04
    container: ghcr.io/lingo-db/lingodb-py-dev:a49b5b26648d55dda2817c23b70376d94e8f9084
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
            submodules: recursive
      - name: Build
        run: |
          rm -rf /built-packages
          mkdir -p /built-packages
          bash tools/python/bridge/create_package.linux.sh cp312-cp312
          cd tools/python
          /opt/python/cp312-cp312/bin/python3 -m build .
          cp dist/*.whl /built-packages/.
      - uses: actions/upload-artifact@master
        with:
          name: lingodb-python-build
          path: /built-packages

  test_lingodb_python:
    needs: build_lingodb_python
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@master
      - uses: actions/download-artifact@master
        with:
          name: lingodb-python-build
          path: built-packages
      - name: Test
        run: |
          pip install built-packages/*.whl
          pip install pandas
          python3 tools/python/test/test.py
          python3 tools/python/test/mlir-construction.py

  # cp313 wheel: built WITH embedded-CPython UDF support. CPython 3.13
  # added Py_FinalizeEx auto-reaping of leftover sub-interpreters, which
  # lets ~Session safely defer cross-thread teardown to the runtime.
  build_lingodb_python_313:
    # Python-UDF jobs are gated: run on every pull_request, and on pushes
    # only when the branch name contains "python". For everyday work on
    # other branches this avoids the long sub-interpreter build / test
    # cycle.
    if: github.event_name == 'pull_request' || contains(github.ref, 'python')
    runs-on: ubuntu-24.04
    container: ghcr.io/lingo-db/lingodb-py-dev:a49b5b26648d55dda2817c23b70376d94e8f9084
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
            submodules: recursive
      - name: Build
        run: |
          rm -rf /built-packages
          mkdir -p /built-packages
          bash tools/python/bridge/create_package.linux.sh cp313-cp313 with-python-udf
          cd tools/python
          /opt/python/cp313-cp313/bin/python3 -m build .
          cp dist/*.whl /built-packages/.
      - uses: actions/upload-artifact@master
        with:
          name: lingodb-python-build-313
          path: /built-packages

  test_lingodb_python_313:
    # Same gate as the build it depends on; the dependency alone is not
    # enough — the job would still be evaluated and skipped, but with an
    # explicit if we get a clean "skipped" status across both jobs.
    if: github.event_name == 'pull_request' || contains(github.ref, 'python')
    needs: build_lingodb_python_313
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@master
      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: actions/download-artifact@master
        with:
          name: lingodb-python-build-313
          path: built-packages
      - name: Test
        run: |
          python3 -m pip install built-packages/*.whl
          python3 -m pip install pandas
          python3 tools/python/test/test.py
          python3 tools/python/test/mlir-construction.py
          python3 tools/python/test/python-udf.py
          python3 tools/python/test/python-udf-heavy.py

  python_udfs:
    # Same gating as the wheel jobs — UDF-specific.
    if: github.event_name == 'pull_request' || contains(github.ref, 'python')
    strategy:
      matrix:
        include:
          - python_mode: CPYTHON
          - python_mode: WASM
      fail-fast: false
    runs-on: ubuntu-24.04
    container: ghcr.io/lingo-db/lingodb-dev:ba723e305302f60aefe75084c3b0c60e12dbad70
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Init required submodules
        run: |
          # The cpython-wasm submodule's nested .gitmodules still uses
          # git@github.com:; rewrite to https for unauthenticated CI access.
          git config --global url.https://github.com/.insteadOf git@github.com:
          REPO_ROOT=$(pwd)
          git config --global --add safe.directory "$REPO_ROOT"
          git submodule update --init vendored/tpde vendored/mimalloc
          if [ "${{ matrix.python_mode }}" = "WASM" ]; then
            # cpython-wasm itself, then only the bits the build actually
            # needs (cpython source + WAMR runtime). wasi-sdk is fetched as
            # a prebuilt tarball at cmake time; numpy is unused here.
            # --checkout overrides the `update = none` set in .gitmodules
            # (which keeps recursive checkout out of cpython-wasm for
            # non-Python jobs).
            git submodule update --init --checkout vendored/cpython-wasm
            git -C vendored/cpython-wasm config --add safe.directory "$REPO_ROOT/vendored/cpython-wasm"
            git -C vendored/cpython-wasm submodule update --init cpython wasm-micro-runtime
          fi
      - name: Install python mode-specific deps
        run: |
          if [ "${{ matrix.python_mode }}" = "CPYTHON" ]; then
            apt-get update
            apt-get install -y python3-dev python3-pip
            # pyarrow is needed at build time (the runtime includes
            # arrow/python/pyarrow.h and links libarrow_python) and at
            # test time (tabular Python UDFs hand pyarrow.Table objects
            # back and forth). pandas is used by the tabular UDF tests.
            python3 -m pip install --break-system-packages pyarrow pandas
          fi
          # WASM mode needs only wget+tar to fetch wasi-sdk-29; both are
          # in the dev container already.
      - name: CPU info
        # ubuntu-24.04 GitHub-Actions runners are not feature-uniform; print
        # the CPU info so any future cpu-feature-related issues are easy
        # to correlate.
        run: |
          lscpu
          echo "---"
          grep -m1 "model name" /proc/cpuinfo
          echo "---"
          grep -m1 flags /proc/cpuinfo
      - name: Build
        run: |
          make clean
          make build-release ENABLE_PYTHON=${{ matrix.python_mode }}
        env:
          CC: clang-20
          CXX: clang++-20
      - name: Test python-udfs (scalar)
        run: |
          chmod +x build/lingodb-release/*
          # The python-udfs.test file lives outside test/sqlite-small/ so
          # the default test job (which builds with ENABLE_PYTHON=OFF) does
          # not try to execute Python UDFs and abort.
          build/lingodb-release/sqlite-tester test/sqlite-small-python/python-udfs.test
      - name: Test python-udfs (tabular)
        # Tabular UDFs need pyarrow (loaded above) and the "compatible"
        # sub-interpreter mode; pyarrow's C extension is single-phase
        # init and refuses to load into the WASM backend's sandbox.
        if: matrix.python_mode == 'CPYTHON'
        env:
          LINGODB_PYTHON_SUBINTERPRETER_MODE: compatible
        run: |
          build/lingodb-release/sqlite-tester test/sqlite-small-python/python-udfs-tabular.test
      - name: Test sqlite-small (regression with Python enabled)
        # Confirm we did not break the existing tests when Python is on.
        run: |
          make test-no-rebuild-sqlite-small
        env:
          TEST_BUILD_TYPE: release

  test_standalone:
    needs: build
    strategy:
      matrix:
        build_type: [ debug]
    runs-on: ubuntu-24.04
    container: ghcr.io/lingo-db/lingodb-dev:ba723e305302f60aefe75084c3b0c60e12dbad70
    steps:
      - uses: actions/checkout@master
      - uses: actions/download-artifact@master
        with:
          name: ${{ matrix.build_type }}-build
          path: build/lingodb-${{ matrix.build_type }}
      - name: Test
        run: |
          REPO_ROOT=$(pwd)
          git config --global --add safe.directory "$REPO_ROOT"
          touch build/dependencies
          touch build/lingodb-${{ matrix.build_type }}/.stamp
          touch build/lingodb-${{ matrix.build_type }}/.buildstamp
          chmod +x build/lingodb-${{ matrix.build_type }}/*
          make DATA_BUILD_TYPE=${{ matrix.build_type }} resources/data/test/.stamp
          echo "select * from test" > test.sql
          bash tools/standalone-query/create.sh test.sql resources/data/test build/lingodb-${{ matrix.build_type }} /standalone-dir gh-ci-standalone-test-branch
          cd /standalone-dir
          mkdir build && cd build
          cmake  -DCMAKE_BUILD_TYPE=Release ..
          cmake --build . -j $(nproc)
          ./main $REPO_ROOT/resources/data/test
